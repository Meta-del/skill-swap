{% extends 'base.html' %}

{% block content %}

<div class="container">

<h1 class="mb-4">Find a Mentor</h1>

<div class="row">

{% for mentor in mentors %}

<div class="col-md-4">

<div class="card mentor-card">

<div class="card-body">

<h4>
{{ mentor.user.username }}
</h4>

<p>
Teaches:
<strong>{{ mentor.skill }}</strong>
</p>

<a
href="{% url 'public_profile' mentor.user.id %}"
class="btn btn-primary mentor-btn">

View Profile

</a>
</button>

</div>

</div>

</div>

{% empty %}

<p>No mentors found.</p>

{% endfor %}

</div>

</div>

{% endblock %}
