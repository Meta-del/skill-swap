{% extends 'base.html' %}

{% block content %}

<h1>Explore Matches</h1>

{% for match in matches %}

<p>
    {{ match.user.username }}
    teaches
    {{ match.skill.name }}
</p>
<a href="{% url 'explore' %}">Explore</a>
<a href="{% url 'send_request' match.id %}">
    Send Request
</a>

<hr>
<form method="GET">

<input
type="text"
name="q"
placeholder="Search skills">

<button type="submit">
Search
</button>

</form>
{% empty %}

<p>No matches found.</p>

{% endfor %}
{% endblock %}
